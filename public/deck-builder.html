<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DCG - デッキ構築</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="deck-builder">
    <!-- 左ペイン: カード詳細プレビュー -->
    <div class="preview-panel panel">
      <div id="preview-content" class="preview-content empty">
        <p class="empty-msg">カードを選択してください</p>
      </div>
    </div>

    <!-- 中央ペイン: カード・シールド一覧とフィルタ -->
    <div class="collection-panel panel">
      <div class="collection-header">
        <div class="tabs">
          <div class="tab active" data-tab="cards">カード</div>
          <div class="tab" data-tab="shields">シールド</div>
        </div>
        
        <div class="filters" id="card-filters">
          <!-- 色フィルタ: アイコン形式 -->
          <div class="color-filter-bar">
            <button class="color-orb active" data-color="red" title="赤"><span class="orb-inner red"></span></button>
            <button class="color-orb active" data-color="blue" title="青"><span class="orb-inner blue"></span></button>
            <button class="color-orb active" data-color="green" title="緑"><span class="orb-inner green"></span></button>
            <button class="color-orb active" data-color="white" title="白"><span class="orb-inner white"></span></button>
            <button class="color-orb active" data-color="black" title="黒"><span class="orb-inner black"></span></button>
          </div>
          <!-- タイプ/コストフィルタ -->
          <div class="type-cost-filters">
            <div class="pill-group type-filters">
              <button class="pill active" data-type="all">ALL</button>
              <button class="pill" data-type="unit">UNIT</button>
              <button class="pill" data-type="spell">SPELL</button>
            </div>
            <div class="pill-group cost-filters">
              <button class="pill active" data-cost="all">ALL</button>
              <button class="pill" data-cost="0">0</button>
              <button class="pill" data-cost="1">1</button>
              <button class="pill" data-cost="2">2</button>
              <button class="pill" data-cost="3">3</button>
              <button class="pill" data-cost="4">4</button>
              <button class="pill" data-cost="5">5</button>
              <button class="pill" data-cost="6">6</button>
              <button class="pill" data-cost="7+">7+</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- カード一覧グリッド -->
      <div class="card-grid" id="card-grid"></div>
      <!-- シールド一覧グリッド（非表示スタート） -->
      <div class="card-grid" id="shield-grid" style="display:none;"></div>
    </div>

    <!-- 右ペイン: 構築中のデッキ情報 -->
    <div class="deck-panel panel">
      <!-- デッキ保存/読み込みスロット -->
      <div class="save-slots">
        <div class="save-slot active" data-slot="0">1</div>
        <div class="save-slot" data-slot="1">2</div>
        <div class="save-slot" data-slot="2">3</div>
        <div class="save-slot" data-slot="3">4</div>
        <div class="save-slot" data-slot="4">5</div>
        <button class="btn-save-deck" id="btn-save-deck" title="現在のデッキを保存">💾</button>
      </div>

      <div class="deck-panel-header">
        <h2>YOUR DECK</h2>
        <div class="deck-counts">
          <span class="deck-count-badge"><span id="deck-count">0</span>/40</span>
          <span class="deck-count-badge shield-badge"><span id="shield-count">0</span>/3</span>
        </div>
      </div>
      
      <div class="deck-list-container" id="deck-list">
        <!-- デッキ内のカード一覧 -->
      </div>
      
      <!-- シールドの表示 -->
      <div class="shield-list-section">
        <h3 class="shield-section-title">SHIELDS</h3>
        <div id="shield-slots">
          <!-- 選んだシールド一覧 -->
        </div>
      </div>
      
      <button class="btn btn-primary btn-start-game" id="btn-submit-deck" disabled>START GAME</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/audio-manager.js"></script>
  <script src="/js/deck-builder.js"></script>
</body>
</html>
